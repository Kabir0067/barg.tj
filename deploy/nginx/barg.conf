# ACTIVE reverse-proxy config for bargtj.softclub.win
# Lives inside the shared "apexhub_nginx" Docker container at:
#   /etc/nginx/conf.d/barg.conf
# (The host nginx is inactive because ports 80/443 are owned by this container.)
# Upstreams use 172.17.0.1 = the Docker host gateway, where the two systemd
# services listen: Django/Gunicorn on :8001, Next.js on :3001.

upstream barg_django { server 172.17.0.1:8001; }
upstream barg_nextjs  { server 172.17.0.1:3001; }

server {
    listen 80;
    server_name bargtj.softclub.win www.bargtj.softclub.win;
    return 301 https://;
}

server {
    listen 443 ssl;
    server_name bargtj.softclub.win www.bargtj.softclub.win;
    client_max_body_size 50M;

    ssl_certificate     /etc/letsencrypt/live/bargtj.softclub.win/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bargtj.softclub.win/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /api/ {
        proxy_pass         http://barg_django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /site-admin/ {
        proxy_pass         http://barg_django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /media/ {
        proxy_pass         http://barg_django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        add_header         Cache-Control "public, max-age=604800";
    }

    location /static/ {
        proxy_pass         http://barg_django;
        proxy_set_header   Host $host;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        proxy_pass         http://barg_nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
