# INACTIVE legacy host-nginx config (kept for reference).
# Path on server: /etc/nginx/sites-available/barg.softclub.win
# Host nginx does not run on this server (ports 80/443 are bound by the
# apexhub_nginx Docker container), so this file is not what serves traffic.
# The live config is ../nginx/barg.conf inside the Docker container.

upstream barg_django { server 127.0.0.1:8001; }
upstream barg_nextjs { server 127.0.0.1:3001; }

server {
    listen 80;
    server_name barg.softclub.win www.barg.softclub.win;
    client_max_body_size 50M;

    location /api/ {
        proxy_pass         http://barg_django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /media/ {
        alias   /var/www/barg.tj/Back-End/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /static/ {
        alias   /var/www/barg.tj/Back-End/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        gzip_static on;
    }

    location / {
        proxy_pass         http://barg_nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
